name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Verify tag and source versions
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          skill_version=$(python - <<'PY'
          import re, yaml
          text = open('SKILL.md', encoding='utf-8').read()
          fm = re.match(r'\A---\s*\n(.*?)\n---', text, re.S).group(1)
          print(yaml.safe_load(fm)['metadata']['version'])
          PY
          )
          changelog_version=$(sed -nE 's/^## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CHANGELOG.md | head -n 1)
          test "$tag_version" = "$skill_version"
          test "$tag_version" = "$changelog_version"

      - name: Run all release gates
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/run_ci.py --official-design-md

      - name: Build release files
        run: |
          mkdir -p dist
          python scripts/build_skill_distribution.py . --out "dist/design-artifact-generator-${GITHUB_REF_NAME}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: design-artifact-generator-${{ github.ref_name }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256 --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
