name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run deterministic gates
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/run_ci.py

  official-design-md:
    name: Official DESIGN.md validator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate positive fixture with pinned upstream CLI
        run: npx --yes -p @google/design.md@0.3.0 designmd lint tests/fixtures/minimal-artifact/DESIGN.md

      - name: Ensure invalid fixture is rejected
        shell: bash
        run: |
          set +e
          npx --yes -p @google/design.md@0.3.0 designmd lint tests/fixtures/invalid-design/DESIGN.md > official-invalid-report.json
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Invalid DESIGN.md unexpectedly passed the official validator"
            cat official-invalid-report.json
            exit 1
          fi

  distribution:
    name: Build distribution
    needs: [python-quality, official-design-md]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Build reproducible Skill ZIP
        run: |
          mkdir -p dist
          version=$(python - <<'PY'
          import re, yaml
          text = open('SKILL.md', encoding='utf-8').read()
          fm = re.match(r'\A---\s*\n(.*?)\n---', text, re.S).group(1)
          print(yaml.safe_load(fm)['metadata']['version'])
          PY
          )
          python scripts/build_skill_distribution.py . --out "dist/design-artifact-generator-v${version}.zip"

      - name: Upload distribution
        uses: actions/upload-artifact@v7
        with:
          name: design-artifact-generator-distribution
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14
